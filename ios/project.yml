name: Simmer
options:
  bundleIdPrefix: com.simmer
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"

configs:
  Debug: debug
  Release: release

targets:
  Simmer:
    type: application
    platform: iOS
    sources:
      - path: SimmerApp
        excludes:
          - "**/.DS_Store"
    resources:
      - path: SimmerApp/Resources/Assets.xcassets
      - path: SimmerApp/Resources/LaunchScreen.storyboard
        optional: true
    info:
      path: SimmerApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: Simmer
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - remote-notification
        NSCameraUsageDescription: Simmer uses the camera so you can photograph your own recipes.
        NSPhotoLibraryUsageDescription: Simmer uses your photo library so you can add photos to your recipes.
        NSFaceIDUsageDescription: Unlock Simmer quickly with Face ID.
        NSUserTrackingUsageDescription: Simmer does not track you across other companies' apps or websites.
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.food-and-drink
        CFBundleURLTypes:
          - CFBundleURLName: com.simmer.app
            CFBundleURLSchemes:
              - simmer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simmer.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: SimmerApp/Resources/Simmer.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ShareExtension

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - "**/.DS_Store"
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Save to Simmer
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simmer.app.ShareExtension
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements

  SimmerAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SimmerAppTests
    dependencies:
      - target: Simmer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simmer.app.tests

schemes:
  Simmer:
    build:
      targets:
        Simmer: all
        ShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SimmerAppTests
    archive:
      config: Release
